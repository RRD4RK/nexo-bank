<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NexoBank | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600&family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
  </head>
  <body data-page="login" data-base="../">
    <div data-component="navbar"></div>
    <main class="page-shell">
      <form class="card form-card" id="loginForm">
        <div class="card-body">
          <p class="kicker">Cliente autenticado</p>
          <h1 class="h2">Login seguro</h1>
          <p class="text-muted">Usuário teste: CPF <strong>123.456.789-00</strong> e senha <strong>123</strong>.</p>
          <div class="form-floating mb-3">
            <input class="form-control cpf-mask" id="loginCpf" type="text" placeholder="CPF" required>
            <label for="loginCpf">CPF</label>
          </div>
          <div class="form-floating mb-3">
            <input class="form-control" id="loginPassword" type="password" placeholder="Senha" required>
            <label for="loginPassword">Senha</label>
          </div>
          <div class="d-grid gap-2">
            <button class="btn btn-primary btn-lg" type="submit">Entrar</button>
            <a class="btn btn-link" href="register.html">Criar nova conta</a>
          </div>
          <div class="alert alert-danger mt-3 d-none" id="loginFeedback" role="alert"></div>
        </div>
      </form>
    </main>
    <div data-component="footer"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>window.jQuery || document.write('<script src="../node_modules/jquery/tmp/jquery.js"><\/script>');</script>
    <script src="../node_modules/jquery-mask-plugin/dist/jquery.mask.min.js"></script>
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
