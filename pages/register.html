<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NexoBank | Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600&family=Public+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/scss-demo.css" />
  </head>
  <body data-page="register" data-base="../">
    <div data-component="navbar"></div>
    <main class="page-shell">
      <form class="card wide-card" id="registerForm">
        <div class="card-body">
          <p class="kicker">Cadastro</p>
          <h1 class="h2">Criar conta NexoBank</h1>
          <p class="text-muted">
            Toda nova conta começa com saldo inicial de <strong>R$ 0,00</strong>.
          </p>
          <div class="row g-3 mt-1">
            <div class="col-12">
              <div class="form-floating">
                <input
                  class="form-control"
                  id="registerName"
                  type="text"
                  placeholder="Nome completo"
                  minlength="3"
                  required
                />
                <label for="registerName">Nome completo</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating">
                <input
                  class="form-control cpf-mask"
                  id="registerCpf"
                  type="text"
                  placeholder="CPF"
                  inputmode="numeric"
                  maxlength="14"
                  pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
                  title="Digite o CPF no formato 000.000.000-00"
                  required
                />
                <label for="registerCpf">CPF</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating">
                <input
                  class="form-control"
                  id="registerPassword"
                  type="password"
                  placeholder="Senha"
                  minlength="3"
                  required
                />
                <label for="registerPassword">Senha</label>
              </div>
            </div>
            <div class="col-12">
              <div class="form-floating">
                <select class="form-select" id="registerProfile" required>
                  <option value="" selected disabled>Selecione o tipo de conta</option>
                  <option value="corrente">Conta corrente</option>
                  <option value="poupanca">Conta poupança</option>
                </select>
                <label for="registerProfile">Tipo de conta</label>
              </div>
            </div>
          </div>
          <div class="form-check mt-3">
            <input class="form-check-input" id="registerTerms" type="checkbox" required />
            <label class="form-check-label" for="registerTerms"
              >Aceito os termos de uso e a política de privacidade.</label
            >
          </div>
          <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
            <a class="btn btn-outline-secondary" href="login.html">Voltar</a>
            <button class="btn btn-primary flex-fill" type="submit">Cadastrar e identificar</button>
          </div>
          <div class="alert alert-danger mt-3 d-none" id="registerFeedback" role="alert"></div>
        </div>
      </form>
    </main>
    <div data-component="footer"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      window.jQuery ||
        document.write('<script src="../node_modules/jquery/tmp/jquery.js"><\/script>');
    </script>
    <script src="../node_modules/jquery-mask-plugin/dist/jquery.mask.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
